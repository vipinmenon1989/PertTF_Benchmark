name: Snakemake CI

on:
  push:
    branches: [main, benchmark]
  pull_request:
    branches: [main, benchmark]

jobs:
  lint-and-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.10"
          activate-environment: pertTF_bench

      - name: Install Snakemake
        shell: bash -el {0}
        run: conda install -y -c conda-forge -c bioconda snakemake

      - name: Install lint dependencies
        shell: bash -el {0}
        run: python -m pip install flake8

      - name: Lint Python scripts
        shell: bash -el {0}
        run: |
          flake8 --max-line-length=120 --extend-ignore=E501,W503 \
            pre_analysis.py LGB_celltype.py LGB_genotype.py \
            scVI/scVI_analysis_celltype.py scVI/scVI_analysis_genotype.py

      - name: Validate Snakefile syntax
        shell: bash -el {0}
        run: python -m py_compile pre_analysis.py LGB_celltype.py LGB_genotype.py scVI/scVI_analysis_celltype.py scVI/scVI_analysis_genotype.py

      - name: Generate Dummy Input Data
        shell: bash -el {0}
        run: |
          touch object_integrated_assay3_annotated_final.modified.cleaned.updated.celltype2_only.h5ad

      - name: Snakemake dry run
        shell: bash -el {0}
        run: snakemake -n --cores 1
